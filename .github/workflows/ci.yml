name: TestGenie Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testgenie_test
        ports:
          - 5432:5432
        # NB: no docker-entrypoint-initdb.d mount anymore. db:bootstrap
        # (the next-but-one step) runs every numbered migration against
        # the empty container. init.sql is retained for docker-compose
        # use cases but is no longer the source of CI's schema.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testgenie_test
      # Some integration tests resolve TEST_DB_URL before DATABASE_URL.
      # Keep them in sync so the suite runs against the same DB whichever
      # variable the file picks up.
      TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/testgenie_test
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters-long
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      OPENAI_API_KEY: sk-test-placeholder
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bootstrap database (run all numbered migrations)
        # Replaces the old `psql -f docker/init.sql` step. That only seeded
        # the initial schema; it did NOT apply migrations 006+, leaving CI's
        # test DB structurally behind every dev machine that runs
        # node-pg-migrate. The integration tests passed anyway because
        # src/index.js's inline runStartupMigrations IIFE self-heals on
        # boot — accidental green. db:bootstrap makes the schema state
        # explicit so we'd catch the next migration drift loudly.
        run: npm run db:bootstrap

      - name: Run tests
        run: npm test

      - name: Syntax check all source files
        run: |
          find src -name '*.js' | while read f; do
            node -c "$f" || exit 1
          done

  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for security vulnerabilities
        run: npm audit --production --audit-level=critical || true
